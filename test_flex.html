<!DOCTYPE html>
<html lang="en">
<head>
  <style>
    body { margin: 0; background: #222; color: #fff; height: 100vh; display: flex; flex-direction: column; }
    .container { flex: 1; min-height: 60vh; border: 1px solid red; display: flex; flex-direction: column; }
    .inner { flex: 1; flex-direction: column; display: flex; min-height: 0; border: 1px solid blue; }
    .chart-wrapper { flex: 1; width: 100%; min-height: 0; border: 1px solid green; }
    .chart { height: 100%; width: 100%; background: rgba(0,255,0,0.2); }
  </style>
</head>
<body>
  <div style="height: 200px; border: 1px solid yellow;">Header</div>
  <div class="container">
    <div class="inner">
      <div class="chart-wrapper" style="height: 100%;">
        <div class="chart">Chart Area</div>
      </div>
    </div>
  </div>
</body>
</html>
